name: README automation workflow

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-latest-contrib:
    name: Update README dynamic sections
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Update README dynamic blocks
        env:
          GH_USERNAME: meghmavani
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node latest-contrib.js

      - name: Commit and push changes
        run: |
          if git diff --quiet README.md assets/now-building.svg assets/system-pulse.svg assets/spotlight-card.svg; then
            echo "No README/banner changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/now-building.svg assets/system-pulse.svg assets/spotlight-card.svg
          git commit -m ":memo: update README automation blocks"
          git push
